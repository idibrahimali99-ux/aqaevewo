services:
  postgres:
    image: postgres:16
    container_name: vewo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vewo
      POSTGRES_USER: vewo
      POSTGRES_PASSWORD: vewo_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  adminer:
    image: adminer:4
    container_name: vewo_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  minio:
    image: minio/minio:latest
    container_name: vewo_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: vewo_storage_admin
      MINIO_ROOT_PASSWORD: vewo_storage_password_change_me
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:

